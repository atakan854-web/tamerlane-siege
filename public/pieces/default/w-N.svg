<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base 1 (wide foundation) -->
  <rect x="23" y="87" width="53" height="8.5" rx="1" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Base 2 (stepped) -->
  <rect x="28" y="80.5" width="43" height="7" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Horse neck and head main silhouette (elegant arch facing right) -->
  <path d="M 41,73 
           C 39.5,60 39,51 44.5,42 
           C 48,35 52.5,31.5 60,32 
           C 67,33 71.5,38 75.5,43 
           L 81,47 
           L 81.5,52.5 
           C 80,60 71,64 53.5,68.5 
           L 43.5,75 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Snout area refinement -->
  <path d="M71.5,37 L78.5,39 L82,46 L81.5,51 L73,54 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2.5"/>
  
  <!-- Ear (pointed, elegant) -->
  <path d="M56,29.5 L53.5,22 L61.5,25 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Flowing mane (3 curves - Persian miniature style) -->
  <path d="M42.5,50 C42,41 44.5,35.5 49.5,29" fill="none" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="4" stroke-linecap="round"/>
  <path d="M44.5,54 C45.5,44 49,37 55.5,31" fill="none" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M48,56 C49.5,47 54,40 61.5,35" fill="none" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Eye -->
  <ellipse cx="71" cy="43" rx="1.7" ry="2" fill="var(--piece-fill, #F5E6CA)"/>
  
  <!-- Mouth -->
  <path d="M77.5,49.5 L82.5,49.5" fill="none" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2"/>
  
  <!-- Nostril -->
  <ellipse cx="77.8" cy="45.5" rx="1" ry="1.1" fill="var(--piece-fill, #F5E6CA)"/>
</svg>
