<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base platform 1 (wide foundation) -->
  <rect x="21" y="87" width="58" height="8" rx="1" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Base platform 2 (stepped) -->
  <rect x="27" y="81" width="46" height="7" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Compact soldier body (armored robe, slightly tapered) -->
  <path d="M34,53 L34,77 L38,80 L62,80 L66,77 L66,53 L61,48 L40,48 Z" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Neck/collar -->
  <rect x="42" y="45" width="16" height="6" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Head (round) -->
  <circle cx="50" cy="39" r="8.5" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.8"/>
  
  <!-- Persian/Timurid pointed helmet cap -->
  <path d="M42.5,34 L44,29 L48,25 L52,24 L56.5,29 L57.5,34 L42.5,34 Z" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.8" stroke-linejoin="round"/>
  
  <!-- Small helmet spike -->
  <path d="M50,24 L50,19.5" fill="none" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.2" stroke-linecap="round"/>
</svg>
