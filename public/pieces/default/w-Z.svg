<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Bottom wide base -->
  <rect x="18.5" y="86.5" width="63" height="9" rx="1" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Stepped second base -->
  <rect x="24.5" y="80" width="51" height="7" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Giraffe body -->
  <path d="M33.5,54 L33,72 L36.5,76 L53.5,76 L57.5,67 L55.5,54 L48.5,49.5 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Very long neck - thick outline -->
  <path d="M48.5,50 C49.5,36 48,27 46.5,14" fill="none" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="10.5" stroke-linecap="round"/>
  <!-- Neck fill -->
  <path d="M48.5,50 C49.5,36 48,27 46.5,14" fill="none" stroke="var(--piece-stroke, #4A3728)" stroke-width="6.6" stroke-linecap="round"/>
  
  <!-- Head -->
  <path d="M42.5,12.5 L43,9.5 L55.5,8.5 L60.5,13 L60,18.5 L47.5,19.5 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2.8" stroke-linejoin="round"/>
  
  <!-- Ossicones (distinctive giraffe horns) -->
  <rect x="46.8" y="5.5" width="2.8" height="6" rx="1" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2"/>
  <rect x="53.2" y="6" width="2.8" height="5.5" rx="1" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2"/>
  
  <!-- Ear -->
  <path d="M41.2,13 L37.5,10.5 L39.2,16 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2"/>
  
  <!-- Eye -->
  <circle cx="56.5" cy="14.5" r="1.35" fill="var(--piece-fill, #F5E6CA)"/>
  
  <!-- Mane (elegant geometric line) -->
  <path d="M44.5,48 C45.8,38 46.5,27 47.2,16" fill="none" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2.8" stroke-linecap="round"/>
  
  <!-- Tail -->
  <path d="M33.5,68 C30,70 28.5,71 29.5,76" fill="none" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linecap="round"/>
</svg>
