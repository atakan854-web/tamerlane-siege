<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wide foundation base -->
  <rect x="19" y="87" width="62" height="8.5" rx="1" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Stepped second base -->
  <rect x="25" y="80" width="50" height="7" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Tall slender body / staff (telescope housing) -->
  <rect x="46" y="41" width="8" height="40" rx="1.5" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Telescope/eye housing platform -->
  <rect x="35.5" y="35" width="29" height="7" rx="2" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Large almond eye - outer silhouette (Persian style, facing right for forward alertness) -->
  <path d="M 30.5,27 
           C 31.5,21.5 36.5,17.5 47.5,18 
           C 60,19 67.5,22 70,27.5 
           C 69,33 63.5,36.5 49.5,36.5 
           C 37,35.5 32.5,32 30.5,27 Z" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Iris (geometric detail) -->
  <ellipse cx="53.5" cy="27" rx="6.8" ry="7.8" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2"/>
  
  <!-- Pupil (alert center) -->
  <ellipse cx="55" cy="27" rx="3.1" ry="3.8" fill="var(--piece-fill, #4A3728)"/>
  
  <!-- Geometric eyebrow / telescope rim (Timurid elegance) -->
  <path d="M34,18 C37.5,14.5 43,13 52,13.5 C61,14.5 66.5,18 69,21" fill="none" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
