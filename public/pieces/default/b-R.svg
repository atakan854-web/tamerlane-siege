<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Bottom wide foundation -->
  <rect x="18" y="86.5" width="64" height="9" rx="1" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Stepped middle base -->
  <rect x="23.5" y="80" width="53" height="7" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Main tower body (tall fortress shaft) -->
  <rect x="32.5" y="39" width="35" height="42" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Parapet platform -->
  <rect x="29" y="35.5" width="42" height="4.5" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Crenellations (geometric battlements - 4 merlons) -->
  <rect x="30.5" y="26.5" width="7" height="10" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="41" y="26.5" width="7" height="10" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="51.5" y="26.5" width="7" height="10" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="62" y="26.5" width="7" height="10" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Fortress doorway (Persian style) -->
  <rect x="43" y="57" width="14" height="23" rx="2" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2"/>
  
  <!-- Vertical structural lines (Timurid architectural detail) -->
  <line x1="38.5" y1="41" x2="38.5" y2="79" stroke="var(--piece-stroke, #4A3728)" stroke-width="2"/>
  <line x1="61.5" y1="41" x2="61.5" y2="79" stroke="var(--piece-stroke, #4A3728)" stroke-width="2"/>
</svg>
