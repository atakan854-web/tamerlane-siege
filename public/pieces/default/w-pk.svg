<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base platform 1 -->
  <rect x="21" y="87" width="58" height="8" rx="1" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Base platform 2 -->
  <rect x="27" y="81" width="46" height="7" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Tall soldier body (taller than generic pawn, shorter than Prince) -->
  <path d="M34,47 L34,77 L38,80 L62,80 L66,77 L66,47 L60,44 L39,44 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Neck/collar -->
  <rect x="42" y="42" width="16" height="5.5" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Head -->
  <circle cx="50" cy="37" r="8.7" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2.8"/>
  
  <!-- Pointed helmet cap -->
  <path d="M41.5,31.5 L43.5,28 L48,25 L52,24.5 L56.5,28 L58.5,31.5 L41.5,31.5 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2.7" stroke-linejoin="round"/>
  
  <!-- Small subtle crown (2 peaks) on helmet - symbol of promotion to Prince -->
  <path d="M44.5,23 L47,17 L49.5,19.5 L51.5,13 L54,19.5 L56.5,17 L59,23 L44.5,23 Z" fill="var(--piece-fill, #4A3728)" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Helmet center detail -->
  <line x1="50" y1="24" x2="50" y2="19" stroke="var(--piece-stroke, #F5E6CA)" stroke-width="1.8"/>
</svg>
