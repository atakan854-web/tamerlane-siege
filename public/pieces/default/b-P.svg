<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base platform 1 (widest, commanding foundation) -->
  <rect x="22" y="88" width="56" height="7" rx="1" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Base platform 2 (stepped inward) -->
  <rect x="27" y="82" width="46" height="6" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Base platform 3 (narrower pedestal) -->
  <rect x="33" y="76" width="34" height="6" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Main body shaft (slightly shorter than King, subordinate scale) -->
  <rect x="41" y="50" width="18" height="27" rx="1.5" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Flared upper body/head (regal widening before crown) -->
  <path d="M41,50 L37,44 L37,37 L63,37 L63,44 L58,50 Z" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Crown band (simpler, narrower band) -->
  <rect x="38" y="32" width="24" height="5" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Prince crown: 3 pointed geometric peaks (center tallest, clearly subordinate to King's 5 peaks) -->
  <path d="M38,32 L42.5,20 L47,26 L50,11 L53,26 L57.5,20 L62,32 L38,32 Z" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Central geometric Islamic pattern divider (robe line) -->
  <line x1="50" y1="72" x2="50" y2="35" stroke="var(--piece-stroke, #4A3728)" stroke-width="2.5"/>
  
  <!-- Ornamental belt band (Persian miniature elegance) -->
  <rect x="39.5" y="55" width="21" height="3" fill="var(--piece-fill, #F5E6CA)" stroke="var(--piece-stroke, #4A3728)" stroke-width="2"/>
</svg>
